# Fine-Tuning Configuration Template
# Copy this file and modify settings as needed:
# cp config.yaml config_custom.yaml
# python finetune_forecasting.py --config config_custom.yaml

[architecture]
# Pre-trained model checkpoint
pretrained_model = tsfm_pretrain.pt

# Model architecture (must match pre-trained model)
context_length = 512      # Input sequence length
patch_length = 32         # Patch size (512/32 = 16 patches)
embed_dim = 128           # Embedding dimension
num_heads = 8             # Number of attention heads
num_layers = 4            # Number of transformer layers
dropout = 0.1             # Dropout rate

# Forecasting task
forecast_horizon = 24     # Prediction steps (24, 96, or 192)
pooling = mean            # Pooling strategy: mean or flatten

[training]
# Linear probe (frozen encoder)
linear_probe_epochs = 10
linear_probe_lr = 1e-3
linear_probe_batch_size = 32

# Full fine-tuning (unfrozen encoder)
finetune_epochs = 20
finetune_lr = 5e-5        # Lower than pre-training (1e-4)
finetune_batch_size = 32

# Optimization
weight_decay = 1e-4
gradient_clip = 1.0

[data]
# Dataset configuration
data_dir = data           # Directory containing datasets
datasets = ETTh1,Metro,Beijing_PM25

# Train/Val/Test splits (chronological)
train_ratio = 0.7
val_ratio = 0.1
test_ratio = 0.2

# Windowing
context_length = 512
forecast_horizon = 24
stride = 128              # Stride for sliding windows (512/4 = 25% overlap)

[evaluation]
# Evaluation settings
metrics = mse,mae         # Metrics to compute
train_from_scratch = true # Train baseline model
batch_size = 32

[output]
# Output configuration
output_dir = finetuning_results
save_models = true
save_plots = true
save_report = true

[system]
# System settings
seed = 42
device = auto             # auto, cuda, or cpu
num_workers = 4           # DataLoader workers
batch_size = 32
dtype = float32           # float32 or float16
compile_model = false     # Use torch.compile (PyTorch 2.0+)
